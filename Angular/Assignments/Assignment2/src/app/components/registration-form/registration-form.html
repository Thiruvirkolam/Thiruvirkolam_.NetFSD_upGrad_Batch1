<h2>Registration Form</h2>

<form #registerForm="ngForm" (ngSubmit)="register(registerForm)">
  <div>
    <label>Name:</label>
    <input
      type="text"
      name="name"
      ngModel
      required
      #name="ngModel"
    />

    <small *ngIf="name.touched && name.invalid">
      Name is required
    </small>
  </div>

  <div>
    <label>Email:</label>
    <input
      type="email"
      name="email"
      ngModel
      required
      email
      #email="ngModel"
    />

    <small *ngIf="email.touched && email.invalid">
      Enter a valid email
    </small>
  </div>

  <div>
    <label>Password:</label>
    <input
      type="password"
      name="password"
      ngModel
      required
    />
  </div>

  <button type="submit" [disabled]="registerForm.invalid">
    Submit
  </button>
</form>
